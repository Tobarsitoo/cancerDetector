<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Detector IA de Cáncer de Mama</title>

    <link rel="stylesheet" href="css/styles.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <div class="container mt-4">
      <div class="header text-center">
        <h2>🧬 Detector de Cáncer de Mama con IA</h2>

        <p>Sistema de apoyo diagnóstico basado en aprendizaje automático</p>
      </div>

      <!-- SECCION FORMULARIO -->

      <div id="form-section">
        <div class="card">
          <h5 class="section-title">Datos del tumor</h5>

          <div class="row" id="inputs"></div>

          <button onclick="predict()" class="btn btn-primary btn-analyze w-100 mt-3">
            Analizar con IA
          </button>
        </div>
      </div>

      <!-- SECCION RESULTADOS -->

      <div id="result-section" style="display: none">
        <div class="card result-card">
          <h5 class="section-title">Resultado del diagnóstico</h5>

          <div id="result"></div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <h5 class="section-title">Probabilidad de malignidad</h5>

              <canvas id="probChart"></canvas>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card">
              <h5 class="section-title">Interpretación de la IA</h5>

              <canvas id="shapChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card mt-3">
          <h5 class="section-title">Variables más influyentes</h5>

          <ul id="topVariables"></ul>
        </div>

        <button onclick="resetApp()" class="btn btn-secondary w-100 mt-3">
          Volver a hacer diagnóstico
        </button>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
